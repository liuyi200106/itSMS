services:
  - type: web
    name: sms-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn student_system.wsgi:application --log-file -
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://sms-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sms-frontend.onrender.com,https://sms-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: connectionString
  - type: web
  name: sms-frontend
  env: static
  rootDir: frontend
  buildCommand: npm ci && npm run build
  staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sms-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sms-db
    databaseName: sms_db
    user: sms_db_user
    plan: free
