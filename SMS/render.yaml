services:
  - type: web
    name: sms-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn student_system.wsgi:application --log-file -
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: sms-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://sms-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sms-frontend.onrender.com

  - type: web
    name: sms-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sms-backend.onrender.com/api

databases:
  - name: sms-db
    plan: free
