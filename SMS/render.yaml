services:
  - type: web
    name: sms-backend
    env: python
    rootDir: SMS/backend
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py createsuperuser --noinput || true
    startCommand: gunicorn student_system.wsgi:application --bind 0.0.0.0:$PORT --log-file -
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://sms-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sms-frontend.onrender.com,https://sms-backend.onrender.com,https://sms-backend-zr53.onrender.com
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        value: admin123456

  - type: web
    name: sms-frontend
    env: static
    rootDir: SMS/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sms-backend-zr53.onrender.com/api

databases:
  - name: sms-db
    plan: free
